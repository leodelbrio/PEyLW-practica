<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button id="botonSaludo">Saludar</button>

    <input type="text" id="teclado" placeholder="Presione una tecla">
    <p id="tecla"></p>

    <script>
        //ASIGANR BOTON DESDE EL HTML
        const boton = document.getElementById("botonSaludo");
        //FUNCION SALUDAR POR CONSOLA
        function saludar() {console.log("hola")};
        //LLAMAR A LA FUNCION SALUDAR EN EL CLICK DEL BOTON
        boton.addEventListener("click", saludar);

        const teclado = document.getElementById("teclado");
        const tecla = document.getElementById("tecla");

        function mostrarTecla(event){
            tecla.textContent = "Tecla presionada " + event.key;
        }

        teclado.addEventListener("keydown" , mostrarTecla);
    </script>

    <script src="script.js" defer></script>
</body>
</html>
