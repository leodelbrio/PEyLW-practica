<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilo.css">
    <title>formularios</title>
</head>
<body>
    <div> 
        <div></div>
        <div id="form">
            <form> 
                <label for="nombre">Ingrese su nombre</label>
                <br>
                <input type="text" id="nombre" required>
                <br><br>
                <label for="apellido">Ingrese su apellido</label>
                <br>
                <input type="text" id="apellido" required>
                <br><br>
                <label for="usuario">Ingrese su usuario</label>
                <br>
                <input type="text" id="usuario" placeholder="Nombre de usuario" required>
                <br><br>
                <label for="pais">Ingrese su pais</label>
                <br>
                <input type="text" id="pais" placeholder="nombre del pais" required>
                <br><br>
                Seleccione su provincia:
                <br>
                <select name="provincia" id="provincia">
                    <option value="nqn">Neuquen</option>
                    <option value="RioNegro">Rio Negro</option>
                    <option value="Chubut">Chubut</option>
                    <option value="lapampa">La Pampa</option>
                </select>
                <br><br>
                <label for="ciudad">Ingrese su ciudad</label>
                <br>
                <input type="text" id="ciudad" value="Allen" required>
                <br><br>
                <label for="email">Ingrese su email</label>
                <br>
                <input type="email" id="email" placeholder="juan@gmail.com" required maxlength="12" minlength="4">
                <br><br>
                <label for="contra">Ingrese su contaseña</label>
                <br>
                <input type="password" id="contra" required maxlength="20" minlength="6">
                <br><br>
                <label for="edad">Ingrese su edad</label>
                <br>
                <input type="number" id="edad" min="18" max="99">
                <br><br>
                <label for="acomp">Ingrese la cantidad de acompañantes</label>
                <br>
                <input type="number" id="acomp" min="0" max="5">
                <br><br>
                <label for="fecha">Fecha de nacimiento</label>
                <br>
                <input type="date" name="fecha" id="fecha" required>
                <br><br>
                <label for="hora">Ingrese hora preferida de contacto</label>
                <br>
                <input type="datetime" name="hora" id="hora">
                <br><br>
                Ingrese su Modalidad Preferida
                <br>
                <input type="radio" id="Presencial" value="Presencial" name="modalidad">
                <label for="Presencial">Presencial</label>
                <br>
                <input type="radio" id="Virtual" value="Virtual" name="modalidad">
                <label for="Virtual">Virtual</label>
                <br>
                <input type="radio" id="Mixta" value="Mixta" name="modalidad">
                <label for="Mixta">Mixta</label>
                <br><br>
                Intereses
                <br>
                <input type="checkbox" name="html" id="html">
                <label for="html">HTML</label>
                <br>
                <input type="checkbox" name="css" id="css">
                <label for="css">CSS</label>
                <br>
                <input type="checkbox" name="javascript" id="javascript">
                <label for="javascript">JavaScript</label>
                <br>
                <input type="checkbox" name="diseñoWeb" id="diseñoWeb">
                <label for="diseñoWeb">Diseño Web</label>
                <br>
                <input type="checkbox" name="backend" id="backend">
                <label for="backend">Backend</label>
                <br><br>
                <label for="text">Dejanos tu comentario</label>
                <br>
                <textarea name="textarea" id="text" cols="30" rows="10"></textarea>
                <br><br>
                <input type="submit" value="Enviar" id="Enviar"> 
            </form>
        </div>
        <div></div>
    </div>
</body>
</html>
